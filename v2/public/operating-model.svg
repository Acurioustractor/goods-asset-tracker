<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1180" width="1680" height="1180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
<defs><filter id="sh" x="-8%" y="-8%" width="116%" height="124%">
<feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#5A4A38" flood-opacity="0.10"/></filter></defs>
<rect width="1680" height="1180" fill="#FBFAF5"/>
<text x="840.0" y="70" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">Goods on Country: operating model</text>
<text x="840.0" y="106" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">How philanthropy, product revenue and community ownership move through the confirmed entity structure.</text>
<rect x="40" y="138" width="1600" height="50" rx="14" fill="#EFE8DA7F" stroke="#C9BCA8" stroke-width="1.3"/>
<text x="66" y="168.0" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#6F6155" letter-spacing="1.2">TWO CAPITAL STREAMS</text>
<line x1="370" y1="163.0" x2="412" y2="163.0" stroke="#C2A55E" stroke-width="3" stroke-linecap="round"/>
<text x="422" y="168.0" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2A241E">Philanthropic capital  -&gt;  Butterfly DGR  -&gt;  funds the fixed block</text>
<line x1="1050" y1="163.0" x2="1092" y2="163.0" stroke="#4C9B97" stroke-width="3" stroke-linecap="round"/>
<text x="1102" y="168.0" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2A241E">Product revenue  -&gt;  trading company  -&gt;  pays the per-bed cost</text>
<rect x="60" y="250" width="360" height="150" rx="16" fill="#FFFFFF" stroke="#C2A55E" stroke-width="1.8" filter="url(#sh)"/><rect x="60" y="250" width="360" height="8" rx="16" fill="#C2A55E"/><rect x="60" y="254" width="360" height="6" rx="0" fill="#C2A55E"/><text x="240.0" y="284" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">Funders &amp; philanthropy</text><text x="240.0" y="304" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">Foundations, donors, catalytic capital</text><text x="240.0" y="328" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">QBE Catalysing Impact match, grants, gifts, and</text><text x="240.0" y="344" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">patient capital seeking a clean DGR pathway.</text><text x="240.0" y="366" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Needs a deductible, accountable home.</text>
<rect x="60" y="460" width="360" height="150" rx="16" fill="#FFFFFF" stroke="#4C9B97" stroke-width="1.8" filter="url(#sh)"/><rect x="60" y="460" width="360" height="8" rx="16" fill="#4C9B97"/><rect x="60" y="464" width="360" height="6" rx="0" fill="#4C9B97"/><text x="240.0" y="494" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">Institutional buyers</text><text x="240.0" y="514" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">Councils, health, community orgs, corporates</text><text x="240.0" y="538" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Purchase Stretch Beds and washing machines at the</text><text x="240.0" y="554" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">shop price (AU$750/bed).</text><text x="240.0" y="576" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Some buyers are donor-funded; the order still</text><text x="240.0" y="592" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">flows as product revenue.</text>
<rect x="690" y="238" width="470" height="196" rx="16" fill="#FFFFFF" stroke="#C2A55E" stroke-width="1.8" filter="url(#sh)"/><rect x="690" y="238" width="470" height="8" rx="16" fill="#C2A55E"/><rect x="690" y="242" width="470" height="6" rx="0" fill="#C2A55E"/><text x="925.0" y="272" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">The Butterfly Movement Ltd</text><text x="925.0" y="292" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">Charity / DGR home  ·  operational from FY2026-27</text><text x="925.0" y="316" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">ACNC-registered charity with Item 1 DGR status.</text><text x="925.0" y="338" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Receives and stewards philanthropic capital; funds the on-Country</text><text x="925.0" y="354" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">plant, training, and the annual fixed block.</text><text x="925.0" y="376" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Closes the SIH-flagged DGR and scale-up-advisor gap.</text><rect x="840.0" y="404" width="170" height="21" rx="10" fill="#C2A55E28" stroke="#C2A55E" stroke-width="1.1"/><text x="925.0" y="419" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#8F7A45">ACNC  ·  Item 1 DGR</text>
<rect x="690" y="498" width="470" height="230" rx="16" fill="#FFFFFF" stroke="#BD6A3C" stroke-width="1.8" filter="url(#sh)"/><rect x="690" y="498" width="470" height="8" rx="16" fill="#BD6A3C"/><rect x="690" y="502" width="470" height="6" rx="0" fill="#BD6A3C"/><text x="925.0" y="532" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">A Curious Tractor Pty Ltd</text><text x="925.0" y="552" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">trading as Goods on Country  ·  the trading &amp; operating company</text><text x="925.0" y="576" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">ABN 36 697 347 676 · ACN 697 347 676.</text><text x="925.0" y="598" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Holds product design, manufacturing systems, training, logistics,</text><text x="925.0" y="614" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">sales, and back-office.</text><text x="925.0" y="636" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Takes product revenue from buyers; provides systems, training, and</text><text x="925.0" y="652" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">tooling to community production.</text><text x="925.0" y="674" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Migration note: Nicholas Marchesi sole trader (ABN 21 591 780 066)</text><text x="925.0" y="690" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">is the current operating entity during the move.</text><rect x="835.0" y="698" width="180" height="21" rx="10" fill="#BD6A3C28" stroke="#BD6A3C" stroke-width="1.1"/><text x="925.0" y="713" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#8B4E2C">Trading / operating co</text>
<rect x="1280" y="300" width="340" height="196" rx="16" fill="#FFFFFF" stroke="#6F9C68" stroke-width="1.8" filter="url(#sh)"/><rect x="1280" y="300" width="340" height="8" rx="16" fill="#6F9C68"/><rect x="1280" y="304" width="340" height="6" rx="0" fill="#6F9C68"/><text x="1450.0" y="334" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">Community-led production</text><text x="1450.0" y="354" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">Aboriginal-owned, On-Country</text><text x="1450.0" y="378" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Local entities run collection, pressing,</text><text x="1450.0" y="394" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">assembly, and repair.</text><text x="1450.0" y="416" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Receive systems, training, and tooling from the</text><text x="1450.0" y="432" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">trading company.</text><text x="1450.0" y="454" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Build jobs, capability, and ownership where the</text><text x="1450.0" y="470" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">beds are used.</text>
<rect x="1280" y="560" width="340" height="150" rx="16" fill="#FFFFFF" stroke="#8A5A45" stroke-width="1.8" filter="url(#sh)"/><rect x="1280" y="560" width="340" height="8" rx="16" fill="#8A5A45"/><rect x="1280" y="564" width="340" height="6" rx="0" fill="#8A5A45"/><text x="1450.0" y="594" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#2A241E">Ownership &amp; jobs On-Country</text><text x="1450.0" y="614" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">the destination</text><text x="1450.0" y="638" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Production capability and value stay in</text><text x="1450.0" y="654" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">community.</text><text x="1450.0" y="676" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">The long-term aim: community-owned plants, with</text><text x="1450.0" y="692" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#2A241E">Goods stepping back.</text>
