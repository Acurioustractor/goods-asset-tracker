<rect x="60" y="756" width="1560" height="58" rx="14" fill="#8A5A451E" stroke="#8A5A45" stroke-width="1.5"/>
<text x="86" y="781" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#664233" letter-spacing="1.4">THE MODEL</text>
<text x="86" y="800" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#2A241E">Community leads the design. Goods supports the building. Production transfers to community ownership.</text>
<text x="1594" y="790" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#664233" font-style="italic">Two streams, one purpose.</text>
<line x1="60" y1="834" x2="1620" y2="834" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="854" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">A Kind Tractor Ltd is dormant and not used as the Goods vehicle. The Goods-specific entity boundary is still being settled with legal advice.</text>
<text x="60" y="876" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="400" fill="#6F6155" font-style="italic">Sources: Goods legal-structure review, Butterfly Movement transition (May 2026), and ACT core facts. Structure shown is the confirmed direction; the Goods carve-out is in progress.</text>
</svg>
