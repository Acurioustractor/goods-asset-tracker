<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">Cost-down: in-sourcing captures the value</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">Direct cost per bed falls at each in-sourcing step against the held AU$750 price; at community scale the margin stays community-owned.</text>
