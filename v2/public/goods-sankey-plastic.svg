<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">The circular life of 20 kg of plastic</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">Community waste becomes a bed, the bed stays in community, and more waste re-enters the loop — at 500 beds a year that is 10 tonnes of HDPE kept out of landfill.</text>
