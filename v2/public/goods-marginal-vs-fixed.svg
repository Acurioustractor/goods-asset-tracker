<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 980" width="1680" height="980" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
<defs><filter id="sh" x="-8%" y="-8%" width="116%" height="124%">
<feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#5A4A38" flood-opacity="0.10"/></filter></defs>
<rect width="1680" height="980" fill="#FBFAF5"/>
<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">What a bed actually costs</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">The same total, two ways. The headline divides a fixed annual block over a tiny denominator. Split honestly, the next bed costs far less.</text>
<line x1="100" y1="720" x2="1580" y2="720" stroke="#C9BCA8" stroke-width="1.6"/>
<rect x="355.0" y="200.0" width="230" height="520.0" rx="12" fill="#A8442E7F" stroke="#A8442E" stroke-width="1.8" filter="url(#sh)"/>
<line x1="329.0" y1="376.8" x2="611.0" y2="356.0" stroke="#A8442E" stroke-width="5" stroke-linecap="round"/>
<text x="470" y="180.0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#A8442E">AU$1,912</text>
<text x="470" y="754" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#6F6155" font-style="italic">looks like the cost (at 100/yr)</text>
<text x="470" y="778" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#6F6155">fixed block divided over only 100 beds</text>
<path d="M 625.0 460.0 L 966.0 460.0 M 959.0 453.0 L 969.0 460.0 L 959.0 467.0" fill="none" stroke="#6F6155" stroke-width="3.0" stroke-linecap="round" stroke-linejoin="round"/>
<text x="800.0" y="442.0" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#6F6155">split</text>
<text x="800.0" y="458.0" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#6F6155">honestly</text>
<rect x="1015.0" y="533.7029288702929" width="230" height="186.2970711297071" rx="12" fill="#4C9B97" stroke="#38726F" stroke-width="1.6" filter="url(#sh)"/>
<rect x="1015.0" y="533.7029288702929" width="230" height="14" rx="12" fill="#4C9B97"/>
<rect x="1015.0" y="200.00000000000006" width="230" height="333.70292887029285" rx="12" fill="#8A5A458C" stroke="#8A5A45" stroke-width="1.6" filter="url(#sh)"/>
<rect x="1015.0" y="519.7029288702929" width="230" height="14" rx="0" fill="#8A5A458C"/>
<text x="1130" y="620.8514644351465" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#FFFFFF">AU$685</text>
<text x="1130" y="642.8514644351465" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="600" fill="#FFFFFF">marginal (the next bed)</text>
<text x="1130" y="360.85146443514645" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#664233">AU$1,227</text>
<text x="1130" y="382.85146443514645" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="600" fill="#664233">fixed (spread over volume)</text>
<text x="1130" y="180.00000000000006" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#2A241E">AU$1,912 total</text>
<text x="1130" y="754" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#52734C" font-style="italic">same total, split honestly</text>
<text x="1130" y="778" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#6F6155">marginal scales per bed; fixed is annual</text>
<path d="M 1271.0 533.7029288702929 L 1283.0 533.7029288702929 L 1283.0 720 L 1271.0 720" fill="none" stroke="#38726F" stroke-width="1.6"/>
<text x="1293.0" y="631.8514644351465" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#38726F">scales with each bed</text>
<path d="M 1271.0 200.00000000000006 L 1283.0 200.00000000000006 L 1283.0 533.7029288702929 L 1271.0 533.7029288702929" fill="none" stroke="#664233" stroke-width="1.6"/>
<text x="1293.0" y="371.85146443514645" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#664233">does not scale per bed</text>
<rect x="60" y="812" width="1560" height="86" rx="16" fill="#6F9C681E" stroke="#6F9C68" stroke-width="1.8" filter="url(#sh)"/>
<text x="88" y="846" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#52734C" letter-spacing="1.4">THE TWO LEVERS</text>
<text x="88" y="874" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="700" fill="#2A241E">Marginal drops AU$685 to AU$426 once in-sourced.  Breakeven: Factory ~378/yr vs Buy-Kit ~1,882/yr.</text>
<text x="60" y="932" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model (2026-05). AU$1,912 = marginal + fixed block absorbed over a 100-bed denominator; split and breakevens modelled on verified BOM inputs (AU$750 price).</text>
</svg>