<line x1="60.0" y1="862.0" x2="1620.0" y2="862.0" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="884" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#2A241E">Read left to right: every dollar of revenue is either a cost (cost of goods + freight) or contribution. Contribution first pays the $109,500/yr fixed block; what is left is operating surplus.</text>
<text x="60" y="908" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model v6 (2026-06), in-house (factory) path at 500 beds/yr. BOM + $750 price verified; in-house plastic, labour, freight and volume modelled. Band thickness is proportional to dollars.</text>
</svg>