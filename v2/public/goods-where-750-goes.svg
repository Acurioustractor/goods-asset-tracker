<line x1="60.0" y1="862.0" x2="1620.0" y2="862.0" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="882" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#2A241E">Contribution is what each bed leaves toward the ~$109,500/yr of fixed running costs. Buy-Kit leaves almost nothing; in-house production leaves five times more.</text>
<text x="60" y="906" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model v6 (2026-06). BOM + $750 price verified; in-house legs, labour and freight modelled. Freight shown at the ~100/yr rate ($150/bed).</text>
