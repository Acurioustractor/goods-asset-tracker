<text x="60" y="846" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" font-weight="700" fill="#2A241E">Founder time AU$84K/yr (or AU$21–84K at 25–100% FTE) applies on top. After full founder time: Factory @500 → −AU$14,570; Community @1,000 → +AU$152,560.</text>
<text x="60" y="870" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods financial model (2026-05), before founder time. Operating results and breakevens are modelled on verified BOM inputs (AU$750 price); founder-rate and FTE inputs pending confirmation.</text>
