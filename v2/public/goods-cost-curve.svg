<rect x="168.0" y="220.0" width="360.0" height="56.0" rx="12" fill="#C2A55E28" stroke="#C2A55E" stroke-width="1.4"/>
<text x="186" y="244" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#8F7A45">Same shape as solar &amp; batteries:</text>
<text x="186" y="264" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#2A241E">every doubling of volume bends the cost down.</text>
<line x1="60.0" y1="806.0" x2="1620.0" y2="806.0" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="826" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#2A241E">Marginal cost = what one more bed costs to make and freight, before the ~$109,500/yr fixed block. Owning the plastic press (Buy-Kit → Factory) is the big step down; community feedstock + fair-wage labour holds it there.</text>
<text x="60" y="850" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model v6 (2026-06). BOM + $750 price verified; in-house legs, labour, freight and volumes modelled. Solid points are real/target paths; the dashed tail is illustrative — actual learning rate pending Defy volume quotes.</text>
</svg>