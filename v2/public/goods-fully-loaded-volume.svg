<text x="219.39999999999998" y="190.10526315789474" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#8B4E2C" font-style="italic">the scary number</text>
<text x="219.39999999999998" y="208.10526315789474" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#8B4E2C">= fixed costs ÷ only 100 beds</text>
<line x1="60.0" y1="816.0" x2="1620.0" y2="816.0" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="836" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#2A241E">Fully-loaded = marginal cost + ($109,500 fixed block ÷ beds per year). The bed doesn’t get cheaper to make — we just stop dividing a year of fixed costs by a tiny number.</text>
<text x="60" y="860" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model v6 (2026-06), fully-loaded grid. Freight falls with volume ($150→$80/bed) as pallets fill. Modelled; volumes are targets, not commitments.</text>
