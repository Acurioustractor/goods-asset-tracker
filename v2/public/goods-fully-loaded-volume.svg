<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">Why “$1,780 a bed” is misleading</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">Fully-loaded cost is fixed running costs divided by how many beds we make. Make more beds and it collapses toward the real marginal cost.</text>
