<rect width="1680" height="980" fill="#FBFAF5"/>
<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">How many beds to break even</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">Each bed’s contribution stacks up toward the $109,500/yr fixed block. In-house production crosses it at ~335 beds; buying kits needs ~1,679.</text>
