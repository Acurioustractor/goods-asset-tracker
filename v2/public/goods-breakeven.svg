<text x="417.30555555555554" y="554.72" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#52734C">~333–338 beds/yr</text>
<text x="417.30555555555554" y="574.72" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">in-house breakeven</text>
<text x="1509.838888888889" y="498.72" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#38726F">~1,679 beds/yr</text>
<text x="1509.838888888889" y="480.72" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6F6155" font-style="italic">buy-kit can’t realistically break even</text>
<line x1="60.0" y1="836.0" x2="1620.0" y2="836.0" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="856" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#2A241E">Breakeven = $109,500 ÷ contribution per bed, at the AU$750 price. The flatter the line, the more beds needed — which is why in-sourcing the plastic (steeper line) is the whole capital case.</text>
<text x="60" y="880" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model v6 (2026-06). Contribution at $750 price, $150/bed freight basis. Philanthropy bridges the gap below breakeven. Modelled.</text>
</svg>