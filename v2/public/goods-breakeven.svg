<text x="118" y="317.0" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#6F6155">$200k</text>
<line x1="130.0" y1="200.0" x2="1620.0" y2="200.0" stroke="#C9BCA8" stroke-width="1" stroke-dasharray="3 6"/>
<text x="118" y="205.0" text-anchor="end" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#6F6155">$250k</text>
<line x1="130.0" y1="760.0" x2="130.0" y2="766.0" stroke="#C9BCA8" stroke-width="1.4"/>
