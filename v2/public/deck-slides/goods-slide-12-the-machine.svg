<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="sans-serif">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif;}
      .sans{font-family:-apple-system,system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
      .mono{font-family:ui-monospace,Menlo,Consolas,'Liberation Mono',monospace;}
      .ink{fill:#26201A;} .soft{fill:#4A4034;} .mut{fill:#7C6F5A;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B9852F"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#F5F0E4"/>
  <rect x="0" y="0" width="12" height="900" fill="#B9852F"/>

  <!-- header -->
  <text x="64" y="74" class="mono" font-size="15" letter-spacing="3" fill="#B9852F">THE MODEL · THE MACHINE</text>
  <text x="62" y="140" class="serif ink" font-size="60" font-weight="600">One container funds the next.</text>

  <!-- ================= LEFT: THE ENGINE ================= -->
  <text x="64" y="228" class="mono" font-size="14" letter-spacing="2" fill="#B0503C">THE ENGINE · CAPTURE THE MARKUP</text>

  <text x="64" y="322" class="serif" font-size="62" font-weight="600" fill="#B0503C">8.6×</text>
  <text x="230" y="300" class="sans soft" font-size="20">the markup we pay on the</text>
  <text x="230" y="326" class="sans soft" font-size="20">plastic legs today</text>
  <text x="230" y="352" class="sans mut" font-size="14">$344 finished kit  vs  ~$40 of shredded plastic</text>

  <line x1="64" y1="384" x2="712" y2="384" stroke="#E3D7BE"/>

  <text x="64" y="452" class="serif" font-size="56" font-weight="600" fill="#9C6C1C">~$260</text>
  <text x="240" y="432" class="sans soft" font-size="20">captured per bed when we</text>
  <text x="240" y="458" class="sans soft" font-size="20">make it in-house</text>
  <text x="240" y="484" class="sans mut" font-size="14">unit cost roughly halves: $685 → $426</text>

  <line x1="64" y1="516" x2="712" y2="516" stroke="#E3D7BE"/>

  <text x="64" y="582" class="serif" font-size="50" font-weight="600" fill="#5E7350">$65 → $324</text>
  <text x="330" y="562" class="sans soft" font-size="20">contribution per bed,</text>
  <text x="330" y="588" class="sans soft" font-size="20">at the $750 price</text>
  <rect x="330" y="600" width="70" height="22" rx="11" fill="#F1E6CC"/>
  <circle cx="344" cy="611" r="4" fill="#BE8636"/><text x="354" y="616" class="mono" font-size="12" font-weight="700" fill="#A9762E">MODELLED</text>

  <!-- ================= RIGHT: THE FLYWHEEL ================= -->
  <text x="905" y="228" class="mono" font-size="14" letter-spacing="2" fill="#B9852F">THE FLYWHEEL · A SELF-LIQUIDATING LOOP</text>

  <!-- dashed ring + rotation arrowheads -->
  <circle cx="1200" cy="400" r="150" fill="none" stroke="#D9C7A3" stroke-width="2" stroke-dasharray="6 8"/>
  <path d="M 1320 312 A 150 150 0 0 1 1350 400" fill="none" stroke="#B9852F" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1080 488 A 150 150 0 0 1 1050 400" fill="none" stroke="#B9852F" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- hub -->
  <circle cx="1200" cy="400" r="66" fill="#F7EAD0" stroke="#D9B978" stroke-width="1.5"/>
  <text x="1200" y="394" class="serif" font-size="17" fill="#9C6C1C" text-anchor="middle" font-weight="600">Payback</text>
  <text x="1200" y="416" class="serif" font-size="17" fill="#9C6C1C" text-anchor="middle" font-weight="600">under 1 year</text>

  <!-- node: top (Make in-house) -->
  <rect x="1120" y="248" width="160" height="58" rx="12" fill="#FBF7EE" stroke="#E7DCC4"/>
  <text x="1200" y="274" class="serif ink" font-size="18" text-anchor="middle">Make in-house</text>
  <text x="1200" y="294" class="sans mut" font-size="12" text-anchor="middle">the 50-bed run proves it</text>

  <!-- node: right (Sell) -->
  <rect x="1330" y="371" width="150" height="58" rx="12" fill="#FBF7EE" stroke="#E7DCC4"/>
  <text x="1405" y="397" class="serif ink" font-size="18" text-anchor="middle">Sell at $750</text>
  <text x="1405" y="417" class="sans mut" font-size="12" text-anchor="middle">to communities + buyers</text>

  <!-- node: bottom (Surplus) -->
  <rect x="1120" y="494" width="160" height="58" rx="12" fill="#FBF7EE" stroke="#E7DCC4"/>
  <text x="1200" y="519" class="serif ink" font-size="18" text-anchor="middle">~$140K</text>
  <text x="1200" y="539" class="sans soft" font-size="13" text-anchor="middle">surplus / year</text>

  <!-- node: left (Fund next) -->
  <rect x="920" y="371" width="160" height="58" rx="12" fill="#FBF7EE" stroke="#E7DCC4"/>
  <text x="1000" y="391" class="serif ink" font-size="18" text-anchor="middle">Fund the next</text>
  <text x="1000" y="411" class="serif ink" font-size="18" text-anchor="middle">container</text>

  <text x="1200" y="606" class="sans soft" font-size="16" text-anchor="middle">One container (~$125K) repays its build in under a year, then funds the next.</text>

  <!-- ================= THE SECRET (band) ================= -->
  <rect x="60" y="642" width="1480" height="86" rx="14" fill="#E7EDE0" stroke="#CBD8BF"/>
  <text x="88" y="686" class="serif" font-size="32" font-weight="600" fill="#4C6242">Fair wages cost the model nothing.</text>
  <text x="700" y="678" class="sans soft" font-size="17">A fair community wage lands about $5 a bed</text>
  <text x="700" y="702" class="sans soft" font-size="17">below a factory. Dignity is not a trade-off.</text>

  <!-- ================= BASE ================= -->
  <text x="64" y="792" class="serif ink" font-size="24" font-style="italic">The return we are building is the transfer itself: the making, and the ownership, move to community.</text>
  <text x="1540" y="792" class="serif mut" font-size="16" text-anchor="end">Goods on Country</text>
</svg>
