<rect x="60" y="624" width="1560" height="96" rx="16" fill="#BD6A3C1E" stroke="#BD6A3C" stroke-width="1.8" filter="url(#sh)"/>
<text x="88" y="658" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#8B4E2C" letter-spacing="1.4">THE CAPITAL CASE</text>
<text x="88" y="688" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#2A241E">HDPE legs = the capital case: in-sourcing the legs captures ~AU$289/bed of supplier margin</text>
<text x="88" y="710" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="400" fill="#6F6155">(in-house legs ~AU$150/bed). Defy panels at 10x are the trap: you pay the press margin and still CNC and assemble.</text>
<line x1="60" y1="744" x2="1620" y2="744" stroke="#C9BCA8" stroke-width="1"/>
<text x="60" y="766" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#6F6155" font-style="italic">Source: Goods cost model (2026-05). Index = paid / raw-material floor per component; HDPE-legs margin is modelled on verified BOM inputs.</text>
</svg>