<text x="840.0" y="74" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#2A241E">Idiot index: where the cost-down is</text>
<text x="840.0" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#6F6155" font-style="italic">Index = what we pay now / raw-material floor. A high bar is not waste; it is supplier margin we could capture by in-sourcing.</text>
<text x="60" y="221.0" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#2A241E">HDPE legs</text>
