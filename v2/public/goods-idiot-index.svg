<text x="1268.0" y="220.0" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#8B4E2C" letter-spacing="0.8">THE LEVER</text>
<text x="60" y="307.0" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="600" fill="#2A241E">Defy panels</text>
<rect x="290" y="276.0" width="1000" height="50" rx="9" fill="#EFE8DA99"/>
<g opacity="0.55">
<rect x="290" y="276.0" width="1000.0" height="50" rx="9" fill="#A8442E" stroke="#7C3222" stroke-width="1.2"/>
</g>
<text x="1304.0" y="308.0" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#7C3222">10x</text>
<text x="302" y="307.0" text-anchor="start" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="600" fill="#FFFFFF">raw AU$40 to paid AU$400</text>
