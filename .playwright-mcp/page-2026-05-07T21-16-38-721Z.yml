            - paragraph [ref=e236]: 06 / Origin
            - heading "A good bed can prevent heart disease." [level=2] [ref=e237]
          - generic [ref=e238]:
            - paragraph [ref=e239]: "In 2018, Nicholas Marchesi attended a health conference where Dr. Bo Remenyi spoke about Rheumatic Heart Disease. Her message was clear: RHD is entirely preventable through good environmental health — yet she was filling out death certificates for children in remote communities dying from this disease."
            - paragraph [ref=e240]: "This confronted Nicholas with the reality of disadvantage in remote Australia. Combined with his experience at Orange Sky — now serving a third of its operations in remote communities — where he witnessed people without beds, without working washing machines, and children with skin infections that cascade into RHD, it sparked the question: What can we actually build that makes a difference?"
            - paragraph [ref=e241]: "The answer became Goods: durable, repairable, community-designed \"health hardware\" that addresses the environmental conditions driving preventable disease."
            - paragraph [ref=e242]:
              - strong [ref=e243]: Our job is to become unnecessary.
