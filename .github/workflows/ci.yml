name: CI

# Quality gate for the Goods app (v2/). Before this, the only gate was Vercel's
# deploy build. This runs the drift guards (the alignment engine's enforcement)
# and the unit tests on every PR and push, plus a daily live asset-register
# drift check.

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
  schedule:
    # Daily live asset-register drift check at 19:00 UTC.
    - cron: '0 19 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: v2

jobs:
  checks:
    name: Drift guards + tests (hermetic)
    # Hermetic: no secrets, no external services. Runs on PRs and pushes.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json
      - run: npm ci
      - name: Drift guards (canon, community-copy, qbe-guardrails)
        run: npm run check:drift:ci
      - name: Unit tests
        run: npm test

  asset-drift:
    name: Live asset-register drift (canon vs Supabase)
    # Needs Supabase secrets, so only where they are available and meaningful:
    # main pushes, the daily schedule, and manual runs. Re-derives the live
    # register and fails if CANONICAL_ASSETS has drifted.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json
      - run: npm ci
      - name: Canon vs live register
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::warning::Supabase secrets (SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY) not set in repo settings; skipping live asset-drift check."
            exit 0
          fi
          node scripts/check-asset-drift.mjs
